<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShellSpecter — System Observatory</title>
    <meta name="description" content="High-performance real-time Linux system observability dashboard" />
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-ghost">
                <div class="ghost-body">
                    <div class="ghost-eye left"></div>
                    <div class="ghost-eye right"></div>
                </div>
                <div class="ghost-tail"></div>
            </div>
            <p class="loading-text">Summoning the Specter<span class="dots">...</span></p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
